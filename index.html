<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3Antias.NET - Quake 3 Servers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #00BFFF;
            text-shadow: 0 0 10px #00BFFF;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 50px; padding-bottom: 20px; border-bottom: 1px solid #00BFFF; }
        .logo { width: 120px; height: 120px; filter: drop-shadow(0 0 15px #00BFFF); }
        .server-title { font-size: 2.5em; margin-top: 15px; }
        .server-container {
            max-width: 900px;
            margin: 0 auto;
            border: 2px solid #00BFFF;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
        }
        .server-header {
            background: linear-gradient(180deg, rgba(0, 191, 255, 0.2) 0%, transparent 100%);
            padding: 20px;
            border-bottom: 1px solid #00BFFF;
        }
        .server-name { font-size: 2em; margin-bottom: 10px; }
        .server-address {
            font-size: 1.2em;
            padding: 8px 15px;
            background-color: rgba(0, 191, 255, 0.1);
            border: 1px dashed #00BFFF;
            display: inline-block;
        }
        .server-content {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 0;
        }
        .server-info, .map-display, .player-info { padding: 25px; }
        .map-display { text-align: center; border-left: 1px solid #00BFFF; border-right: 1px solid #00BFFF; }
        .map-image {
            width: 100%;
            max-width: 400px;
            height: 300px;
            object-fit: cover;
            border: 2px solid #00BFFF;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
            margin-bottom: 15px;
            background-color: #000;
        }
        .map-name { font-size: 1.3em; font-weight: bold; margin-top: 10px; }
        .info-label { font-size: 1.1em; margin-bottom: 8px; }
        .info-value { font-size: 1.4em; font-weight: bold; margin-bottom: 20px; }
        .divider { border-top: 1px dashed #00BFFF; margin: 20px 0; }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #00FF00;
            box-shadow: 0 0 10px #00FF00;
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            .server-content { grid-template-columns: 1fr; }
            .map-display { border-left: none; border-right: none; border-top: 1px solid #00BFFF; border-bottom: 1px solid #00BFFF; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Q3Antias Logo" class="logo">
        <div class="server-title">Q3ANTIAS.NET</div>
    </div>

    <div class="server-container">
        <div class="server-header">
            <div class="server-name">
                <span class="status-indicator" id="statusIndicator"></span>
                <span id="serverName">Antias FFA</span>
            </div>
            <div class="server-address">videos-shut.gl.at.ply.gg:5291</div>
        </div>
        
        <div class="server-content">
            <div class="server-info">
                <div class="info-label">Server Status</div>
                <div class="info-value" style="color: #00FF00;">Online</div>
                <div class="divider"></div>
                <div class="info-label">Players</div>
                <div class="info-value"><span id="playerCount">13</span>/<span id="maxPlayers">64</span></div>
                <div class="divider"></div>
                <div class="info-label">Game Type</div>
                <div class="info-value">FFA</div>
            </div>
            
            <div class="map-display">
    <img src="maps/q3dm12.jpg"
        alt="Current Map"
        class="map-image"
        id="mapImage"
        onerror="this.onerror=null; this.src='https://via.placeholder.com/400x300/000000/008FFF?text=Map+Not+Found'"
    >
    <div class="map-name" id="mapName">q3dm12</div>
</div>

<script>
// Function to update map image based on current map
function updateMapImage(mapName) {
    const mapImage = document.getElementById('mapImage');
    const mapImagePath = `maps/${mapName}.jpg`;
    
    // Set the new image source
    mapImage.src = mapImagePath;
    
    // Handle error if image doesn't exist
    mapImage.onerror = function() {
        this.onerror = null;
        this.src = 'https://via.placeholder.com/400x300/000000/008FFF?text=Map+Not+Found';
    };
}

// Call this function when your server data updates
// Example: updateMapImage('ztn3tourney1');



</script>
</body>
</html>
