<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3Antias.NET - Quake 3 Servers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000000;
            color: #00BFFF;
            text-shadow: 0 0 10px #00BFFF;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 50px; padding-bottom: 20px; border-bottom: 1px solid #00BFFF; }
        .logo { width: 120px; height: 120px; filter: drop-shadow(0 0 15px #00BFFF); }
        .server-title { font-size: 2.5em; margin-top: 15px; }
        .server-container {
            max-width: 900px;
            margin: 0 auto;
            border: 2px solid #00BFFF;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
        }
        .server-header {
            background: linear-gradient(180deg, rgba(0, 191, 255, 0.2) 0%, transparent 100%);
            padding: 20px;
            border-bottom: 1px solid #00BFFF;
        }
        .server-name { font-size: 2em; margin-bottom: 10px; }
        .server-address {
            font-size: 1.2em;
            padding: 8px 15px;
            background-color: rgba(0, 191, 255, 0.1);
            border: 1px dashed #00BFFF;
            display: inline-block;
        }
        .server-content {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 0;
        }
        .server-info, .map-display, .player-info { padding: 25px; }
        .map-display { text-align: center; border-left: 1px solid #00BFFF; border-right: 1px solid #00BFFF; }
        .map-image {
            width: 100%;
            max-width: 400px;
            height: 300px;
            object-fit: cover;
            border: 2px solid #00BFFF;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
            margin-bottom: 15px;
            background-color: #000;
        }
        .map-name { font-size: 1.3em; font-weight: bold; margin-top: 10px; }
        .info-label { font-size: 1.1em; margin-bottom: 8px; }
        .info-value { font-size: 1.4em; font-weight: bold; margin-bottom: 20px; }
        .divider { border-top: 1px dashed #00BFFF; margin: 20px 0; }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #00FF00;
            box-shadow: 0 0 10px #00FF00;
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            .server-content { grid-template-columns: 1fr; }
            .map-display { border-left: none; border-right: none; border-top: 1px solid #00BFFF; border-bottom: 1px solid #00BFFF; }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.jpg" alt="Q3Antias Logo" class="logo">
        <div class="server-title">Q3ANTIAS.NET</div>
    </div>

    <div class="server-container">
        <div class="server-header">
            <div class="server-name">
                <span class="status-indicator" id="statusIndicator"></span>
                <span id="serverName">Antias FFA</span>
            </div>
            <div class="server-address">videos-shut.gl.at.ply.gg:5291</div>
        </div>
        
        <div class="server-content">
            <div class="server-info">
                <div class="info-label">Server Status</div>
                <div class="info-value" style="color: #00FF00;">Online</div>
                <div class="divider"></div>
                <div class="info-label">Players</div>
                <div class="info-value"><span id="playerCount">13</span>/<span id="maxPlayers">64</span></div>
                <div class="divider"></div>
                <div class="info-label">Game Type</div>
                <div class="info-value">FFA</div>
            </div>
            
            <div class="map-display">
                <img src="maps/ztn3tourney1.jpg" 
                     alt="Current Map" 
                     class="map-image" 
                     id="mapImage"
                     onerror="this.onerror=null; this.src='https://via.placeholder.com/400x300/000000/00BFFF?text=Map+Not+Found';">
                <div class="map-name" id="mapName">ztn3tourney1</div>
            </div>
            
            <div class="player-info">
                <div class="info-label">Current Map</div>
                <div class="info-value" style="font-size: 1em;" id="currentMap">ztn3tourney1</div>
                <div class="divider"></div>
                <div class="info-label">Last Update</div>
                <div class="info-value" style="font-size: 1em;" id="lastUpdate">Just now</div>
            </div>
        </div>
    </div>

    <script>
        // Map image database
        const mapImages = {
            'ztn3tourney1': 'maps/ztn3tourney1.jpg',
            'spirit3t1': 'maps/spirit3t1.jpg',
            'uberkill': 'maps/uberkill.jpg',
            'pro-q3tourney4': 'maps/pro-q3tourney4.jpg',
            'q3arenax': 'maps/q3arenax.jpg',
            'pro-q3dm6': 'maps/pro-q3dm6.jpg',
            'ztn3dm2': 'maps/ztn3dm2.jpg',
            'oxodm89': 'maps/oxodm89.jpg',
            'q3wcp18': 'maps/q3wcp18.jpg',
            'ts_ca1': 'maps/ts_ca1.jpg',
            'q3dm17': 'maps/q3dm17.jpg',
            'hub3aeroq3': 'maps/hub3aeroq3.jpg',
            'bardok-cpma2': 'maps/bardok-cpma2.jpg',
            'p1rate-overek': 'maps/p1rate-overek.jpg',
            'cybdmpro2': 'maps/cybdmpro2.jpg',
            'pillcity': 'maps/pillcity.jpg',
            'q3dm1': 'maps/q3dm1.jpg',
            'q3dm2': 'maps/q3dm2.jpg',
            'q3dm3': 'maps/q3dm3.jpg',
            'q3dm4': 'maps/q3dm4.jpg',
            'q3dm5': 'maps/q3dm5.jpg',
            'q3dm6': 'maps/q3dm6.jpg',
            'q3dm7': 'maps/q3dm7.jpg',
            'q3dm8': 'maps/q3dm8.jpg',
            'q3dm9': 'maps/q3dm9.jpg',
            'q3dm10': 'maps/q3dm10.jpg',
            'q3dm11': 'maps/q3dm11.jpg',
            'q3dm12': 'maps/q3dm12.jpg',
            'q3dm13': 'maps/q3dm13.jpg',
            'q3dm14': 'maps/q3dm14.jpg',
            'q3dm15': 'maps/q3dm15.jpg',
            'q3dm16': 'maps/q3dm16.jpg',
            'default': 'maps/quake3_logo'
        };

        async function fetchServerStatus() {
            try {
                const response = await fetch('server_status.php');
                const data = await response.json();
                
                document.getElementById('statusIndicator').style.backgroundColor = data.online ? '#00FF00' : '#FF0000';
                document.getElementById('statusIndicator').style.boxShadow = data.online ? '0 0 10px #00FF00' : '0 0 10px #FF0000';
                document.getElementById('serverName').textContent = data.hostname;
                document.getElementById('playerCount').textContent = data.players;
                document.getElementById('maxPlayers').textContent = data.max_players;
                
                const mapName = data.map.toLowerCase();
                const mapImageSrc = mapImages[mapName] || mapImages['default'];
                
                document.getElementById('mapImage').src = mapImageSrc;
                document.getElementById('mapName').textContent = mapName;
                document.getElementById('currentMap').textContent = mapName;
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                
            } catch (error) {
                console.error('Error fetching server status:', error);
                document.getElementById('statusIndicator').style.backgroundColor = '#FF0000';
            }
        }

        fetchServerStatus();
        setInterval(fetchServerStatus, 30000);
    </script>
</body>
</html>
