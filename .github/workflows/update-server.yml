import json
import socket
from datetime import datetime

def query_quake3_server(host, port):
    sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
    sock.settimeout(5)
    message = b'\xff\xff\xff\xffgetinfo xxx'
    
    try:
        sock.sendto(message, (host, port))
        data, addr = sock.recvfrom(8192)
        response = data.decode('latin-1')
        
        # Remove the infoResponse header first
        response = response.split('\n', 1)[1] if '\n' in response else response
        
        lines = response.split('\n')
        server_info = {}
        players = []
        
        for line in lines:
            line = line.strip()
            
            # Skip empty lines
            if not line:
                continue
            
            # Skip lines that are server info (start with \)
            if line.startswith('\\'):
                parts = line.split('\\')
                for i in range(1, len(parts), 2):
                    if i+1 < len(parts):
                        key = parts[i].strip()
                        value = parts[i+1].strip()
                        if key and value:
                            server_info[key] = value
            else:
                # This should be a player name
                clean_name = line.strip()
                
                # Only add valid player names
                if (clean_name and 
                    len(clean_name) >= 2 and 
                    not clean_name.startswith('\\') and
                    clean_name.lower() not in ['inforesponse', 'status']):
                    players.append(clean_name)
        
        # Remove duplicates while preserving order
        seen = set()
        unique_players = []
        for p in players:
            if p not in seen:
                seen.add(p)
                unique_players.append(p)
        
        return {
            'status': 'Online',
            'map': server_info.get('mapname', 'unknown'),
            'players': unique_players,
            'playerCount': len(unique_players),
            'maxPlayers': int(server_info.get('sv_maxclients', 64)),
            'gameType': server_info.get('g_gametype', 'FFA'),
            'lastUpdate': datetime.utcnow().isoformat() + 'Z'
        }
    except Exception as e:
        print(f'Error: {e}')
        return {
            'status': 'Offline',
            'map': 'unknown',
            'players': [],
            'playerCount': 0,
            'maxPlayers': 64,
            'gameType': 'FFA',
            'lastUpdate': datetime.utcnow().isoformat() + 'Z'
        }
    finally:
        sock.close()

result = query_quake3_server('videos-shut.gl.at.ply.gg', 5291)

with open('server-data.json', 'w') as f:
    json.dump(result, f, indent=2)

print(f"✓ Updated: {result['playerCount']}/{result['maxPlayers']} on {result['map']}")
print(f"Players: {result['players']}")
