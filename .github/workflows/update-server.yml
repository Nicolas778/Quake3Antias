import json
import socket
from datetime import datetime

    sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
    sock.settimeout(5)
    message = b'\xff\xff\xff\xffgetinfo xxx'
    
    try:
        sock.sendto(message, (host, port))
        data, addr = sock.recvfrom(8192)
        response = data.decode('latin-1')
        
        # Dividir la respuesta en líneas
        lines = response.split('\n')
        
        server_info = {}
        players = []
        
        for line in lines:
            line = line.strip()
            
            # Saltar líneas vacías y el header infoResponse
            if not line or 'inforesponse' in line.lower() or line.startswith('\\'):
                continue
            
            # Parsear key-value pairs (empiezan con \)
            if line.startswith('\\'):
                parts = line.split('\\')
                for i in range(1, len(parts), 2):
                    if i+1 < len(parts):
                        key = parts[i].strip()
                        value = parts[i+1].strip()
                        if key and value:
                            server_info[key] = value
            else:
                # Esto debería ser un nombre de jugador
                # Filtrar texto que no sea un jugador válido
                if line and len(line) > 2 and not line.startswith('\\\\'):
                    # Remover caracteres de control
                    clean_name = line.replace('\r', '').strip()
                    if clean_name and not clean_name.startswith('\\'):
                        players.append(clean_name)
        
        # Filtrar jugadores vacíos o duplicados
        players = list(set([p for p in players if p and len(p) > 1]))
        
        return {
            'status': 'Online',
            'map': server_info.get('mapname', 'unknown'),
            'players': players,
            'playerCount': len(players),
            'maxPlayers': int(server_info.get('sv_maxclients', 64)),
            'gameType': server_info.get('g_gametype', 'FFA'),
            'lastUpdate': datetime.utcnow().isoformat() + 'Z'
        }
    except Exception as e:
        print(f'Error: {e}')
        return {
            'status': 'Offline',
            'map': 'unknown',
            'players': [],
            'playerCount': 0,
            'maxPlayers': 64,
            'gameType': 'FFA',
            'lastUpdate': datetime.utcnow().isoformat() + 'Z'
        }
    finally:
        sock.close()

