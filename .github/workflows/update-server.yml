import json
import socket
from datetime import datetime

def query_quake3_server(host, port):
    sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
    sock.settimeout(5)
    message = b'\xff\xff\xff\xffgetinfo xxx'
    
    try:
        sock.sendto(message, (host, port))
        data, addr = sock.recvfrom(8192)
        response = data.decode('latin-1')
        
        lines = response.split('\n')
        
        server_info = {}
        players = []
        in_players_section = False
        
        for line in lines:
            line = line.strip()
            
            if not line:
                continue
            
            if 'inforesponse' in line.lower():
                continue
            
            if line.startswith('\\'):
                parts = line.split('\\')
                for i in range(1, len(parts), 2):
                    if i+1 < len(parts):
                        key = parts[i].strip()
                        value = parts[i+1].strip()
                        if key and value:
                            server_info[key] = value
            else:
                clean_name = line.replace('\r', '').strip()
                
                if (clean_name and 
                    len(clean_name) > 1 and 
                    not clean_name.startswith('\\') and
                    'inforesponse' not in clean_name.lower() and
                    'status' not in clean_name.lower()):
                    players.append(clean_name)
        
        players = list(dict.fromkeys(players))
        
        return {
            'status': 'Online',
            'map': server_info.get('mapname', 'unknown'),
            'players': players,
            'playerCount': len(players),
            'maxPlayers': int(server_info.get('sv_maxclients', 64)),
            'gameType': server_info.get('g_gametype', 'FFA'),
            'lastUpdate': datetime.utcnow().isoformat() + 'Z'
        }
    except Exception as e:
        print(f'Error: {e}')
        return {
            'status': 'Offline',
            'map': 'unknown',
            'players': [],
            'playerCount': 0,
            'maxPlayers': 64,
            'gameType': 'FFA',
            'lastUpdate': datetime.utcnow().isoformat() + 'Z'
        }
    finally:
        sock.close()

result = query_quake3_server('videos-shut.gl.at.ply.gg', 5291)

with open('server-data.json', 'w') as f:
    json.dump(result, f, indent=2)

print(f"✓ Updated: {result['playerCount']}/{result['maxPlayers']} on {result['map']}")
print(f"Players: {result['players']}")
